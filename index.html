<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sunday’s Coming | Versailles UMC</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  color:white;
  text-align:center;
  overflow:hidden;
}

/* 🎥 VIDEO BACKGROUND */
.video-bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* DARK OVERLAY */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom, rgba(0,0,0,.75), rgba(0,0,0,.9));
  z-index:-1;
}

/* CONTENT */
.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:40px 20px;
}

/* TITLE */
.title{
  font-size: clamp(42px, 7vw, 80px);
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:10px;
  text-shadow:0 6px 20px rgba(0,0,0,.9);
}

/* SUBTEXT */
.subtitle{
  font-size:18px;
  max-width:650px;
  line-height:1.6;
  margin-bottom:30px;
  opacity:.9;
}

/* MOBILE DATE */
.mobile-date{
  display:none;
  font-size:18px;
  font-weight:700;
  margin-top:15px;
}

/* BUTTONS */
.btn-group{
  margin-top:30px;
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  justify-content:center;
}

.btn{
  padding:16px 30px;
  border-radius:999px;
  text-decoration:none;
  font-weight:800;
  font-size:16px;
}

.btn-primary{
  background:#d4af37;
  color:black;
}

.btn-outline{
  border:2px solid white;
  color:white;
}

/* 🔴 LIVE MODE */
.live{
  font-size:22px;
  font-weight:900;
  color:#ff3b3b;
  margin-top:20px;
  display:none;
}

/* 📱 MOBILE RULES */
@media (max-width:600px){

  #vumc-worship-countdown{
    display:none !important;
  }

  .mobile-date{
    display:block;
  }
}
</style>
</head>

<body>

<!-- 🎥 VIDEO -->
<video class="video-bg" autoplay muted loop playsinline>
  <source src="media/Easter Loop.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

  <div class="title">Sunday’s Coming</div>

  <div class="subtitle">
    What looked like the end… wasn’t the end.<br>
    Hope is rising. Life is breaking through.
  </div>

  <!-- 🔴 LIVE TEXT -->
  <div id="liveText" class="live">
    🔴 LIVE NOW — Join Us
  </div>

  <!-- ⏳ COUNTDOWN (DESKTOP ONLY) -->
  <div id="countdownWrap">
    :contentReference[oaicite:0]{index=0}
  </div>

  <!-- 📱 MOBILE DATE -->
  <div class="mobile-date">
    Sunday, April 5, 2026 • 10:30 AM
  </div>

  <!-- BUTTONS -->
  <div class="btn-group">

    <a href="https://www.versaillesumc.org/plan-visit-form" class="btn btn-primary">
      Plan Your Visit
    </a>

    <a href="https://www.versaillesumc.org" class="btn btn-outline">
      Visit Church Website
    </a>

  </div>

</div>

<script>
(function(){

const TZ = "America/New_York";
const liveText = document.getElementById("liveText");
const countdownWrap = document.getElementById("countdownWrap");

function parts(date){
  const p = new Intl.DateTimeFormat("en-US", {
    timeZone: TZ,
    hour: "numeric",
    minute: "numeric",
    weekday: "short"
  }).formatToParts(date);

  const m = {};
  p.forEach(x => { if (x.type !== "literal") m[x.type] = x.value });

  return {
    h:+m.hour,
    mi:+m.minute,
    w:m.weekday
  };
}

function checkLive(){
  const now = new Date();
  const z = parts(now);

  const mins = z.h * 60 + z.mi;
  const start = 10*60 + 30;
  const end = 12*60;

  if(z.w === "Sun" && mins >= start && mins < end){
    liveText.style.display = "block";
    countdownWrap.style.display = "none";
  }
}

checkLive();
setInterval(checkLive, 30000);

})();
</script>

</body>
</html>
