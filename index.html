<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sunday’s Coming | Versailles UMC</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  color:white;
  text-align:center;
  background: url('media/Easter-Sunday.jpg') no-repeat center center fixed;
  background-size: cover;
}

.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom, rgba(0,0,0,.75), rgba(0,0,0,.9));
  z-index:-1;
}

.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:30px 20px;
}

.title{
  font-size: clamp(42px, 7vw, 80px);
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:10px;
  text-shadow:0 6px 20px rgba(0,0,0,.9);
}

.subtitle{
  font-size:18px;
  max-width:650px;
  line-height:1.6;
  margin-bottom:25px;
  opacity:.9;
}

.btn-group{
  margin-top:25px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.btn{
  padding:16px 30px;
  border-radius:999px;
  text-decoration:none;
  font-weight:800;
  font-size:16px;
}

.btn-primary{
  background:#d4af37;
  color:black;
}

#vumc-worship-countdown{
  width:100%;
  text-align:center;
  padding:8px 0;
}

.wc-service{
  font-size:22px;
  margin-bottom:12px;
  font-weight:800;
}

.wc-timer{
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
}

.wc-box{
  background:rgba(255,255,255,.92);
  color:#000;
  min-width:90px;
  padding:14px 10px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,.28);
  animation:fadeUp 1s ease forwards;
}

.wc-box span{
  display:block;
  font-size:34px;
  font-weight:900;
}

.wc-box small{
  font-size:11px;
  font-weight:700;
}

.wc-datetime{
  margin-top:10px;
  font-size:14px;
  font-weight:600;
}

.wc-live-btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  background:#fff;
  color:#000;
  padding:12px 22px;
  border-radius:999px;
  font-weight:900;
  text-decoration:none;
  border:2px solid #d4af37;
  animation:livePulse 1.6s infinite ease-in-out;
}

.wc-live-dot{
  width:10px;
  height:10px;
  background:red;
  border-radius:50%;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes livePulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

@media (max-width:600px){
  .wc-service{
    font-size:16px;
  }

  .wc-box{
    min-width:60px;
    padding:8px 6px;
  }

  .wc-box span{
    font-size:20px;
  }

  .wc-box small{
    font-size:9px;
  }

  .wc-datetime{
    font-size:12px;
  }

  .wc-box:first-child{
    display:none;
  }
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

  <div class="title">Sunday’s Coming</div>

  <div class="subtitle">
    What looked like the end… wasn’t the end.<br>
    Hope is rising. Life is breaking through.
  </div>

  <div id="vumc-worship-countdown">
    <div class="wc-service" id="wc-service-label">
      Easter Worship Begins In
    </div>

    <a id="wc-live-button"
       class="wc-live-btn"
       href="https://live.versaillesumc.org"
       target="_blank"
       rel="noopener"
       style="display:none;">
       <span class="wc-live-dot"></span>
       LIVE — WATCH NOW
    </a>

    <div class="wc-timer" id="wc-timer">
      <div class="wc-box">
        <span id="wc-days">0</span>
        <small>DAYS</small>
      </div>
      <div class="wc-box">
        <span id="wc-hours">0</span>
        <small>HOURS</small>
      </div>
      <div class="wc-box">
        <span id="wc-minutes">0</span>
        <small>MINUTES</small>
      </div>
      <div class="wc-box">
        <span id="wc-seconds">0</span>
        <small>SECONDS</small>
      </div>
    </div>

    <div class="wc-datetime">
      Sunday April 5, 2026 • 10:30 AM
    </div>
  </div>

  <div class="btn-group">
    <a href="https://www.versaillesumc.org/plan-your-visit-easter" class="btn btn-primary">
      Plan Your Visit
    </a>
  </div>

</div>

<script>
(function () {
  const TZ = "America/New_York";

  const d = document.getElementById("wc-days");
  const h = document.getElementById("wc-hours");
  const m = document.getElementById("wc-minutes");
  const s = document.getElementById("wc-seconds");

  const label = document.getElementById("wc-service-label");
  const timer = document.getElementById("wc-timer");
  const live = document.getElementById("wc-live-button");

  function parts(date) {
    const p = new Intl.DateTimeFormat("en-US", {
      timeZone: TZ,
      year: "numeric",
      month: "numeric",
      day: "numeric",
      hour: "numeric",
      minute: "numeric",
      second: "numeric",
      hour12: false,
      weekday: "short"
    }).formatToParts(date);

    const o = {};
    p.forEach(x => {
      if (x.type !== "literal") o[x.type] = x.value;
    });

    return {
      y: +o.year,
      mo: +o.month,
      d: +o.day,
      h: +o.hour,
      mi: +o.minute,
      s: +o.second,
      w: o.weekday
    };
  }

  function zonedUTC(y, mo, d, h, mi, s) {
    const guess = new Date(Date.UTC(y, mo - 1, d, h, mi, s));
    const z = parts(guess);
    const shown = Date.UTC(z.y, z.mo - 1, z.d, z.h, z.mi, z.s);
    const want = Date.UTC(y, mo - 1, d, h, mi, s);
    return new Date(guess.getTime() + (want - shown));
  }

  function addDays(y, mo, d, amount) {
    const dt = new Date(Date.UTC(y, mo - 1, d + amount));
    return {
      y: dt.getUTCFullYear(),
      mo: dt.getUTCMonth() + 1,
      d: dt.getUTCDate()
    };
  }

  function state() {
    const now = new Date();
    const z = parts(now);
    const mins = z.h * 60 + z.mi;

    const serviceStart = 10 * 60 + 30;
    const liveEnd = 12 * 60;

    if (z.w === "Sun") {
      if (mins < serviceStart) {
        return {
          mode: "count",
          target: zonedUTC(z.y, z.mo, z.d, 10, 30, 0)
        };
      }

      if (mins >= serviceStart && mins < liveEnd) {
        return {
          mode: "live"
        };
      }
    }

    const map = { Sun: 0, Mon: 1, Tue: 2, Wed: 3, Thu: 4, Fri: 5, Sat: 6 };
    let daysUntilSunday = (7 - map[z.w]) % 7;
    if (daysUntilSunday === 0) daysUntilSunday = 7;

    const next = addDays(z.y, z.mo, z.d, daysUntilSunday);

    return {
      mode: "count",
      target: zonedUTC(next.y, next.mo, next.d, 10, 30, 0)
    };
  }

  function tick() {
    const st = state();

    if (st.mode === "live") {
      label.innerHTML = "🔴 LIVE NOW — Join Us";
      timer.style.display = "none";
      live.style.display = "inline-flex";
      return;
    }

    label.textContent = "Easter Worship Begins In";
    timer.style.display = "flex";
    live.style.display = "none";

    const diff = st.target - new Date();
    const total = Math.max(0, Math.floor(diff / 1000));

    d.textContent = Math.floor(total / 86400);
    h.textContent = String(Math.floor((total % 86400) / 3600)).padStart(2, "0");
    m.textContent = String(Math.floor((total % 3600) / 60)).padStart(2, "0");
    s.textContent = String(total % 60).padStart(2, "0");
  }

  tick();
  setInterval(tick, 1000);
})();
</script>

</body>
</html>
