<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sunday’s Coming | Versailles UMC</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  color:white;
  text-align:center;

  /* 🔥 FALLBACK IMAGE */
  background: url('media/Easter-Sunday.jpg') no-repeat center center fixed;
  background-size: cover;
}

/* 🎥 VIDEO BACKGROUND */
.video-bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
  pointer-events:none;
}

/* DARK OVERLAY */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom, rgba(0,0,0,.7), rgba(0,0,0,.9));
  z-index:-1;
}

/* CONTENT */
.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:30px 20px;
}

/* TITLE */
.title{
  font-size: clamp(42px, 7vw, 80px);
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:10px;
  text-shadow:0 6px 20px rgba(0,0,0,.9);
}

/* SUBTEXT */
.subtitle{
  font-size:18px;
  max-width:650px;
  line-height:1.6;
  margin-bottom:25px;
  opacity:.9;
}

/* BUTTONS */
.btn-group{
  margin-top:25px;
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  justify-content:center;
}

.btn{
  padding:16px 30px;
  border-radius:999px;
  text-decoration:none;
  font-weight:800;
  font-size:16px;
}

.btn-primary{
  background:#d4af37;
  color:black;
}

.btn-outline{
  border:2px solid white;
  color:white;
}

/* COUNTDOWN */
#vumc-worship-countdown{
  width:100%;
  text-align:center;
  padding:8px 0;
}

.wc-service{
  font-size:22px;
  margin-bottom:12px;
  font-weight:800;
}

.wc-timer{
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
}

.wc-box{
  background:rgba(255,255,255,.92);
  color:#000;
  min-width:90px;
  padding:14px 10px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,.28);
  animation:fadeUp 1s ease forwards;
}

.wc-box span{
  display:block;
  font-size:34px;
  font-weight:900;
}

.wc-box small{
  font-size:11px;
  font-weight:700;
}

.wc-datetime{
  margin-top:10px;
  font-size:16px;
  font-weight:600;
}

/* LIVE BUTTON */
.wc-live-btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  background:#fff;
  color:#000;
  padding:12px 22px;
  border-radius:999px;
  font-weight:900;
  text-decoration:none;
  border:2px solid #d4af37;
  animation:livePulse 1.6s infinite ease-in-out;
}

.wc-live-dot{
  width:10px;
  height:10px;
  background:red;
  border-radius:50%;
}

/* ANIMATIONS */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes livePulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

/* 📱 MOBILE OPTIMIZATION */
@media (max-width:600px){

  .wc-service{
    font-size:16px;
  }

  .wc-box{
    min-width:60px;
    padding:8px 6px;
  }

  .wc-box span{
    font-size:20px;
  }

  .wc-box small{
    font-size:9px;
  }

  .wc-datetime{
    font-size:13px;
  }

  /* hide DAYS for mobile */
  .wc-box:first-child{
    display:none;
  }

}
</style>
</head>

<body>

<!-- 🎥 VIDEO -->
<video class="video-bg" autoplay muted loop playsinline>
  <source src="media/Easter-Loop.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

  <div class="title">Sunday’s Coming</div>

  <div class="subtitle">
    What looked like the end… wasn’t the end.<br>
    Hope is rising. Life is breaking through.
  </div>

  <!-- COUNTDOWN -->
  <div id="vumc-worship-countdown">

    <div class="wc-service" id="wc-service-label">
      Easter Worship Begins In
    </div>

    <a id="wc-live-button"
       class="wc-live-btn"
       href="https://live.versaillesumc.org"
       target="_blank"
       style="display:none;">
       <span class="wc-live-dot"></span>
       LIVE — WATCH NOW
    </a>

    <div class="wc-timer" id="wc-timer">
      <div class="wc-box">
        <span id="wc-days">0</span>
        <small>DAYS</small>
      </div>
      <div class="wc-box">
        <span id="wc-hours">0</span>
        <small>HOURS</small>
      </div>
      <div class="wc-box">
        <span id="wc-minutes">0</span>
        <small>MINUTES</small>
      </div>
      <div class="wc-box">
        <span id="wc-seconds">0</span>
        <small>SECONDS</small>
      </div>
    </div>

    <div class="wc-datetime">
      Sunday April 5, 2026 • 10:30 AM
    </div>

  </div>

  <!-- BUTTONS -->
  <div class="btn-group">
    <a href="https://www.versaillesumc.org/plan-visit-form-easter" class="btn btn-primary">
      Plan Your Visit
    </a>

    <a href="https://www.versaillesumc.org" class="btn btn-outline">
      Visit Church Website
    </a>
  </div>

</div>

<script>
(function(){

const TZ="America/New_York";

const d=document.getElementById("wc-days");
const h=document.getElementById("wc-hours");
const m=document.getElementById("wc-minutes");
const s=document.getElementById("wc-seconds");

const label=document.getElementById("wc-service-label");
const timer=document.getElementById("wc-timer");
const live=document.getElementById("wc-live-button");

function getNow(){
  return new Date();
}

function getNextService(){
  const now = getNow();
  const target = new Date();

  target.setHours(10,30,0,0);

  if(now.getDay() !== 0 || now > target){
    target.setDate(target.getDate() + ((7 - now.getDay()) % 7 || 7));
  }

  return target;
}

function isLive(){
  const now = getNow();
  const start = new Date();
  start.setHours(10,30,0,0);

  const end = new Date();
  end.setHours(12,0,0,0);

  return now.getDay() === 0 && now >= start && now < end;
}

function tick(){

  if(isLive()){
    label.innerHTML="🔴 LIVE NOW — Join Us";
    timer.style.display="none";
    live.style.display="inline-flex";
    return;
  }

  const target = getNextService();
  const diff = target - new Date();
  const total = Math.max(0, Math.floor(diff/1000));

  d.textContent = Math.floor(total/86400);
  h.textContent = String(Math.floor((total%86400)/3600)).padStart(2,"0");
  m.textContent = String(Math.floor((total%3600)/60)).padStart(2,"0");
  s.textContent = String(total%60).padStart(2,"0");
}

tick();
setInterval(tick,1000);

})();
</script>

</body>
</html>
